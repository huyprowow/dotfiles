monitor=,preferred,auto,1

exec-once = waybar
exec-once = mako
exec-once = nm-applet

input {
    kb_layout = us
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(4c566a99)
    resize_on_border = true 
    #extend_border_grab_area = 20
}

decoration {
    #rounding = 10

    blur {
        enabled = yes
        size = 5
        passes = 1
    }
}

animations {
    enabled = yes
    
    bezier = fast, 0.25, 0.9, 0.3, 1.0

    animation = windows, 1, 2, fast
    animation = windowsOut, 1, 2, fast
    animation = fade, 1, 2, fast
    animation = border, 1, 4, fast
    animation = workspaces, 1, 3, fast
}
$terminal = kitty
bind = SUPER, Return, exec, $terminal
bind = SUPER, D, exec, wofi --show drun
bind = SUPER, Q, killactive
bind = SUPER, M, exit, ~/.config/hypr/script/exit.sh
bind = SUPER, R, submap, resize
submap = resize
    bind = , right, resizeactive, 10 0
    bind = , left,  resizeactive, -10 0
    bind = , up,    resizeactive, 0 -10
    bind = , down,  resizeactive, 0 10
    bind = , escape, submap, reset
    bind = , Return, submap, reset
submap = reset
bind = SUPER, SPACE, togglefloating,          # Super + SPACE để làm cửa sổ "nổi"
bind = SUPER, F, fullscreen,              # Super + F để toàn màn hình
bind = SUPER, L, exec, hyprlock           #lockscreen

# Switch workspace
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# Focus window (giống sway)
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Swap window (giống Mod+Shift+Arrow trong sway)
bind = SUPER SHIFT, left,  swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up,    swapwindow, u
bind = SUPER SHIFT, down,  swapwindow, d

# move window
bind = SUPER CTRL, left,  movewindow, l
bind = SUPER CTRL, right, movewindow, r
bind = SUPER CTRL, up,    movewindow, u
bind = SUPER CTRL, down,  movewindow, d

# Mouse move/resize floating window
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER SHIFT, left,  moveactive, -20 0
bind = SUPER SHIFT, right, moveactive, 20 0
bind = SUPER SHIFT, up,    moveactive, 0 -20
bind = SUPER SHIFT, down,  moveactive, 0 20

# Resize window
bind = $mainMod SHIFT, H, resizeactive, -40 0
bind = $mainMod SHIFT, L, resizeactive,  40 0
bind = $mainMod SHIFT, K, resizeactive,  0 -40
bind = $mainMod SHIFT, J, resizeactive,  0  40

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot full screen
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%s).png

# Screenshot selection
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png

#env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
#env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct
#env = QT_STYLE_OVERRIDE,kvantum



exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

#exec-once = swww img /home/huyprowow/Pictures/IA.jpg --transition-type fade --transition-duration 1
exec = swww-daemon
exec = swww img /home/huyprowow/Pictures/IA.jpg --transition-type none --transition-fps 60
exec-once = fcitx5 -d

exec-once = hypridle



